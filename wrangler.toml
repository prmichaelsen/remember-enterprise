name = "remember-enterprise"
main = "src/server.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[limits]
cpu_ms = 300000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Durable Objects Bindings
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[[durable_objects.bindings]]
name = "UPLOAD_MANAGER"
class_name = "UploadManager"

# Migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "NotificationHub", "UploadManager"]

# Rate Limiters
[[unsafe.bindings]]
name = "AUTH_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "API_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 100, period = 60 }

[vars]
# Firebase config (shared with agentbase.me)
# Set actual values via wrangler secret or .env
